resources:
  jobs:
    glm_model_pipeline:
      name: "GLM Predictive Analytics Pipeline."
      
      tasks:
        - task_key: 01_data_preparation
          notebook_task:
            notebook_path: ../src/1_data_preparation.py

        - task_key: 02_feature_engineering
          depends_on:
            - task_key: 01_data_preparation
          notebook_task:
            notebook_path: ../src/2_feature_engineering_selection.py

        - task_key: 03_model_setup
          depends_on:
            - task_key: 02_feature_engineering
          notebook_task:
            notebook_path: ../src/3_model_setup.py

        - task_key: 04_training_validation
          depends_on:
            - task_key: 03_model_setup
          notebook_task:
            notebook_path: ../src/4_training_validation.py

        - task_key: 05_model_evaluation
          depends_on:
            - task_key: 04_training_validation
          notebook_task:
            notebook_path: ../src/5_model_evaluation_metrics.py
